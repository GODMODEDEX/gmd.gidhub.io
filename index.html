<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODMODEDEX | TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #030303;
            --primary-red: #ff003c;
            --dark-red: #8a0020;
            --text-color: #ededed;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Share Tech Mono', monospace;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Blood Rain Background */
        #rain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -1;
        }

        .drop {
            position: absolute;
            background: linear-gradient(transparent, var(--primary-red));
            width: 2px;
            height: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* Header & Glitch Effect */
        header {
            margin-top: 10vh;
            text-align: center;
            text-transform: uppercase;
        }

        .glitch {
            font-size: 5rem;
            font-weight: bold;
            position: relative;
            color: var(--primary-red);
            text-shadow: 0 0 10px var(--primary-red), 0 0 20px var(--dark-red);
            letter-spacing: 5px;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #00ffff;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 var(--primary-red);
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(15px, 9999px, 71px, 0); }
            20% { clip: rect(32px, 9999px, 98px, 0); }
            40% { clip: rect(78px, 9999px, 43px, 0); }
            60% { clip: rect(12px, 9999px, 85px, 0); }
            80% { clip: rect(98px, 9999px, 14px, 0); }
            100% { clip: rect(45px, 9999px, 62px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(12px, 9999px, 55px, 0); }
            40% { clip: rect(88px, 9999px, 22px, 0); }
            60% { clip: rect(34px, 9999px, 77px, 0); }
            80% { clip: rect(9px, 9999px, 88px, 0); }
            100% { clip: rect(55px, 9999px, 11px, 0); }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-top: -10px;
            letter-spacing: 2px;
        }

        /* Terminal Interface */
        .dashboard {
            margin-top: 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 80%;
            max-width: 1200px;
        }

        .panel {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--dark-red);
            padding: 25px;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(255, 0, 60, 0.1);
        }

        .panel:hover {
            border-color: var(--primary-red);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.4), inset 0 0 20px rgba(255, 0, 60, 0.2);
            transform: translateY(-5px);
        }

        .panel h2 {
            color: var(--primary-red);
            border-bottom: 1px solid var(--dark-red);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: transparent;
            color: var(--text-color);
            border: 1px solid #333;
            text-align: center;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
        }

        .btn:hover {
            background: var(--primary-red);
            color: #000;
            border-color: var(--primary-red);
            box-shadow: 0 0 10px var(--primary-red);
        }

        /* Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="rain-container"></div>
    <div class="scanlines"></div>

    <header>
        <h1 class="glitch" data-text="GODMODEDEX">GODMODEDEX</h1>
        <p class="subtitle">SYS.OVERRIDE // ACTIVE</p>
    </header>

    <main class="dashboard">
        <div class="panel">
            <h2>> INJECTIONS</h2>
            <button class="btn">Execute LUA Payload</button>
            <button class="btn">Bypass Anti-Cheat</button>
            <button class="btn">KILL NAZIBLOX(Roblox)</button>
        </div>

     

      
    </main>

    <script>
        // Blood Rain Generator
        const rainContainer = document.getElementById('rain-container');
        const dropCount = 100;

        for (let i = 0; i < dropCount; i++) {
            let drop = document.createElement('div');
            drop.classList.add('drop');
            
            // Randomize position, delay, and duration
            let posX = Math.random() * 100;
            let delay = Math.random() * 5;
            let duration = Math.random() * 1 + 0.5;

            drop.style.left = posX + 'vw';
            drop.style.animationDelay = delay + 's';
            drop.style.animationDuration = duration + 's';

            rainContainer.appendChild(drop);
        }
    </script>
</body>
</html>
