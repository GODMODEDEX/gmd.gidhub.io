<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODMODEDEX - SYSTEM OVERRIDE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&amp;family=VT323&amp;display=swap');
        
        :root {
            --red: #ff0000;
            --dark-red: #8b0000;
            --black: #0a0a0a;
            --white: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0000 100%);
            color: var(--white);
            font-family: 'VT323', monospace;
            overflow-x: hidden;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 25% 30%, rgba(255,0,0,0.1) 0%, transparent 50%),
                radial-gradient(circle at 75% 70%, rgba(255,0,0,0.1) 0%, transparent 50%);
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255,0,0,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,0,0,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        
        header {
            background: rgba(10,10,10,0.95);
            border-bottom: 3px solid var(--red);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 30px var(--red);
        }
        
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--red);
            text-shadow: 
                0 0 10px var(--red),
                0 0 20px var(--red),
                0 0 40px #ff4444;
            letter-spacing: 4px;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #ff6666;
            letter-spacing: 2px;
        }
        
        .main-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            position: relative;
            z-index: 5;
        }
        
        .panel {
            background: rgba(15,15,15,0.95);
            border: 2px solid #440000;
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .panel:hover {
            transform: translateY(-8px);
            border-color: var(--red);
            box-shadow: 0 0 35px rgba(255,0,0,0.6);
        }
        
        .panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 40%;
            height: 40%;
            background: radial-gradient(circle, rgba(255,50,50,0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .panel:hover::before {
            opacity: 1;
        }
        
        .panel-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .icon {
            width: 70px;
            height: 70px;
            background: #1a0000;
            border: 2px solid var(--red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: var(--red);
            box-shadow: 0 0 15px var(--red);
        }
        
        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .description {
            color: #ddd;
            line-height: 1.5;
            margin-bottom: 25px;
            font-size: 1.15rem;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        button {
            background: transparent;
            color: var(--white);
            border: 2px solid var(--red);
            padding: 12px 28px;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        button:hover {
            background: var(--red);
            color: var(--black);
            box-shadow: 0 0 20px var(--red);
            transform: scale(1.05);
        }
        
        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,0,0,0.9);
            border-top: 2px solid var(--red);
            padding: 12px;
            text-align: center;
            font-size: 1.1rem;
            color: #aa4444;
            z-index: 100;
        }
        
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(255, 0, 0, 0.03) 50%
            );
            background-size: 100% 6px;
            pointer-events: none;
            animation: scan 4s linear infinite;
            z-index: 1;
            opacity: 0.6;
        }
        
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        
        .glitch {
            animation: glitch 1s linear infinite;
        }
        
        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <header>
        <div class="menu-icon">☰</div>
        <div>
            <div class="logo glitch">GODMODEDEX</div>
            <div class="subtitle">SYSTEM OVERRIDE / THE EXCLUSIVE MOD INDEX</div>
        </div>
